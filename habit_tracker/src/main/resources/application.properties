# CORS - set CORS_ORIGINS env var on Render to your Vercel URL
# Example: https://your-app.vercel.app,http://localhost:3000
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Jackson: return dates as "2026-04-20" strings, not [2026,4,20] arrays
spring.jackson.serialization.write-dates-as-timestamps=false